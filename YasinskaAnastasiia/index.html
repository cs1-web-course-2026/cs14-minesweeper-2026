<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="game">

    <h1 class="title">Minesweeper</h1>

    <div class="header">
      <div class="counter">🚩 <span id="flags-count">15</span></div>

      <button class="start-btn" id="restart-btn" type="button">
        Нова гра
      </button>

      <div class="timer">⏱ <span id="timer-value">000</span></div>
    </div>

    <p class="status" id="game-status-message" role="status" aria-live="polite"></p>

    <div class="board" id="game-board"></div>

  </div>

  <script src="script.js"></script>
</body>
