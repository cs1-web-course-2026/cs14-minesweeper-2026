<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="counter">🚩 10</div>
            <button class="restart-btn">🙂</button>
            <div class="timer">⏱ 000</div>
        </header>

        <main class="game-board">
            <!-- Ряд 1 -->
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed flag"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 2 -->
            <div class="cell closed"></div>
            <div class="cell open number-1">1</div>
            <div class="cell open number-2">2</div>
            <div class="cell open number-1">1</div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 3 -->
            <div class="cell closed"></div>
            <div class="cell open mine">💣</div>
            <div class="cell open number-3">3</div>
            <div class="cell open mine-clicked">💥</div>
            <div class="cell closed"></div>
            <div class="cell closed flag"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 4 -->
            <div class="cell closed"></div>
            <div class="cell open number-1">1</div>
            <div class="cell open number-2">2</div>
            <div class="cell open number-1">1</div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 5 -->
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 6 -->
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 7 -->
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>

            <!-- Ряд 8 -->
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
        </main>
    </div>
</body>
</html>
