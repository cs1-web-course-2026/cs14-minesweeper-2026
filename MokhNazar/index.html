<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Minesweeper</title>
    </head>
    <body>
        <main class="game-container">
            <header class="game-header">
                <div class="stat-box" id="flags-counter">
                    010
                </div>
                <div>
                    <button type="button" class="reset-button" id="reset-button" aria-label="Restart game">🙂</button>
                </div>
                <div class="stat-box" id="timer">
                    000
                </div>
            </header>
            <div class="game-board" id="game-board">
            </div>
            
            <p id="game-message" role="status" aria-live="polite" style="text-align: center; color: white; font-family: monospace; margin-top: 10px;"></p>
        </main>
        
        <script src="script.js"></script>
    </body>
</html>
