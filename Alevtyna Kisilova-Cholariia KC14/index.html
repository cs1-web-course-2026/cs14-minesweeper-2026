<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="game">
        <header class="game-header">
            <div class="status">
                <div id="timer" class="timer" aria-live="polite">00:00</div>
                <div class="flags">
                    <span class="flag-icon" aria-hidden="true"></span> 
                    <span id="flags-count" class="flags-count">0</span>
                </div>
            </div>
            <button id="restart-btn" class="btn-start" type="button">Нова гра</button>
        </header>

        <section id="game-field" class="board" role="grid" aria-label="Minesweeper board" style="--cols:10">
            </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
