<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="game">
      <header class="header" aria-label="Панель гри">
        <div id="flagCounter" class="counter" aria-label="Кількість мін">
          015
        </div>

        <button
          id="restartButton"
          class="smile"
          type="button"
          aria-label="Нова гра"
        >
          🙂
        </button>

        <div id="timer" class="counter" aria-label="Таймер">000</div>
      </header>

      <section id="board" class="board" aria-label="Ігрове поле"></section>

      <p
        id="game-message"
        role="status"
        aria-live="polite"
        class="game-message"
      ></p>

      <section class="legend" aria-label="Демо станів клітинок">
        <h2 class="legend-title">Стани клітинок</h2>

        <div class="legend-row">
          <button
            class="cell closed"
            type="button"
            aria-label="Закрита клітинка"
          ></button>
          <button class="cell open n1" type="button">1</button>
          <button
            class="cell closed flag"
            type="button"
            aria-label="Прапорець"
          ></button>
          <button
            class="cell open mine"
            type="button"
            aria-label="Міна"
          ></button>
          <button
            class="cell open mine hit"
            type="button"
            aria-label="Натиснута міна"
          ></button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
